name: Deploy Pirates Tools

on:
  push:
    branches: ['claude/pirates-tools-rebuild-zWc1b']
    paths:
      - 'pirates-tools/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pirates-tools

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
